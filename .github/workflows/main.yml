name: AbroadNews

on:
  schedule:
    # Yeh har 4 ghante mein chalega (IST ke hisaab se set kiya ja sakta hai)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Isse aap button daba kar manually bhi update kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

    - name: Set up Python
      uses: actions/setup-python@65d7f2d534ac1bc67fcd62888c5f4f3d2cb2b236
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install requests google-generativeai

    - name: Run News Script
      env:
        # Yeh keys aapko GitHub Settings > Secrets mein daalni hongi
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python update_news.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add index.html
        git commit -m "Latest AI News Updated" || echo "No changes to commit"
        git push
        
