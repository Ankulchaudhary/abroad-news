name: AbroadNews

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install requests google-generativeai

    - name: Run News Script
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python update_news.py

    - name: Commit and Push Everything
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        # Agar sitemap file hai tabhi add karein varna error aayega
        git add news-sitemap.xml || echo "Sitemap not found, skipping"
        git commit -m "Latest AI News Updated: $(date)" || echo "No changes to commit"
        git push origin main
        
