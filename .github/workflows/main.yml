name: AbroadNews

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Clone Repo
      run: |
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} .
        git checkout main

    - name: Install Python and SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        # Naya SDK install kar rahe hain
        pip3 install requests google-genai

    - name: Run News Script
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python3 update_news.py

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "AI News Update: $(date)" || exit 0
        git push origin main
        
