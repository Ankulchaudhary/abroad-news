name: AbroadNews
on:
  workflow_dispatch:

jobs:
  run-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Bina kisi 'uses' ke direct checkout
      - name: Clone Repository
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} .
          git checkout main

      - name: Install Python and Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install requests google-generativeai

      - name: Run News Script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 update_news.py

      - name: Push Changes
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "AI Update Done" || exit 0
          git push
          
